version: '3.8'

services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: rockman-mlops-api:latest
    container_name: rockman-production-api
    ports:
      - "8000:8000"
    restart: always
    environment:
      - ENV=production
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - mlops-network

networks:
  mlops-network:
    name: rockman-mlops-network
    driver: bridge
